<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>운동 기록</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
  --text:#f0f0f0;--text-muted:#888;--text-dim:#555;
  --danger:#ff5a5a;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;min-height:100vh;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:380px;}
.auth-logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}
.auth-title{font-size:20px;font-weight:500;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.auth-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:20px;}
.auth-tab{flex:1;padding:7px;text-align:center;font-size:13px;cursor:pointer;border-radius:6px;color:var(--text-muted);transition:all .15s;}
.auth-tab.active{background:var(--surface);color:var(--text);}
.field-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;margin-bottom:14px;transition:border-color .15s;}
.auth-input:focus{outline:none;border-color:var(--accent);}
.auth-btn{width:100%;background:var(--accent);color:#111;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;margin-top:4px;}
.auth-btn:hover{opacity:.85;}
.auth-btn:disabled{opacity:.4;cursor:not-allowed;}
.auth-msg{font-size:13px;text-align:center;margin-top:14px;min-height:20px;}
.auth-msg.error{color:var(--danger);}
.auth-msg.success{color:var(--accent);}
#app-screen{display:none;}
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;}
.user-area{display:flex;align-items:center;gap:10px;}
.user-email{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}
.sync-indicator{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);transition:color .3s;}
.sync-indicator.syncing{color:var(--accent);}
.container{max-width:680px;margin:0 auto;padding:24px 16px 100px;}
.view-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;}
.view-tab{flex:1;padding:7px;text-align:center;font-size:13px;cursor:pointer;border-radius:6px;color:var(--text-muted);transition:all .15s;}
.view-tab.active{background:var(--surface2);color:var(--text);}
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.date-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.date-nav button:hover{background:var(--surface2);}
.date-label{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);cursor:pointer;}
#date-input{position:absolute;opacity:0;pointer-events:none;}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.summary-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);line-height:1;}
.summary-label{font-size:11px;color:var(--text-muted);margin-top:4px;}
.exercise-list{display:flex;flex-direction:column;gap:12px;}
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:opacity .2s,transform .15s;}
.exercise-card.dragging{opacity:.4;transform:scale(.98);}
.exercise-card.drag-over{border-color:var(--accent);border-style:dashed;}
.exercise-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;}
.drag-handle{color:var(--text-dim);cursor:grab;font-size:18px;padding:0 4px;user-select:none;touch-action:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;color:var(--accent);}
.exercise-name{flex:1;font-weight:500;font-size:15px;}
.exercise-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);background:var(--surface2);border-radius:20px;padding:3px 10px;}
.chevron{color:var(--text-dim);font-size:18px;transition:transform .2s;line-height:1;}
.exercise-card.open .chevron{transform:rotate(180deg);}
.sets-body{display:none;border-top:1px solid var(--border);}
.exercise-card.open .sets-body{display:block;}
.sets-header{display:grid;grid-template-columns:36px 1fr 1fr 1fr 40px;gap:8px;padding:10px 16px 6px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 1fr 40px;gap:8px;align-items:center;padding:6px 16px;border-top:1px solid var(--border);}
.set-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim);text-align:center;}
.set-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;width:100%;font-family:'DM Mono',monospace;font-size:14px;text-align:center;-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:var(--accent);}
.del-set-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.del-set-btn:hover{color:var(--danger);}
.card-footer{display:flex;gap:8px;padding:10px 16px 14px;align-items:center;}
.add-set-btn{background:var(--accent-dim);border:1px solid rgba(200,241,53,.3);color:var(--accent);border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.del-exercise-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;}
.del-exercise-btn:hover{color:var(--danger);border-color:var(--danger);}
.add-exercise-area{margin-top:16px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:16px;}
.add-exercise-row{display:flex;gap:8px;align-items:center;}
.add-exercise-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;}
.add-exercise-input:focus{outline:none;border-color:var(--accent);}
.add-exercise-input::placeholder{color:var(--text-dim);}
.confirm-btn{background:var(--accent);color:#111;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.category-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.routine-section{margin-top:20px;}
.section-title{font-size:12px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:0;}
.routine-list{display:flex;flex-direction:column;gap:8px;}
.routine-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.routine-name{flex:1;font-size:14px;font-weight:500;}
.routine-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:2px;}
.routine-info{flex:1;}
.routine-load-btn{background:var(--accent-dim);border:1px solid rgba(200,241,53,.3);color:var(--accent);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
.routine-del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;padding:2px 6px;}
.routine-del-btn:hover{color:var(--danger);}
.save-routine-row{display:flex;gap:8px;margin-top:10px;}
.save-routine-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;}
.save-routine-input:focus{outline:none;border-color:var(--accent);}
.save-routine-input::placeholder{color:var(--text-dim);}
.save-routine-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap;}
.save-routine-btn:hover{border-color:var(--accent);color:var(--accent);}
.show-save-btn{margin-top:10px;width:100%;text-align:center;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.show-save-btn:hover{border-color:var(--accent);color:var(--accent);}
.memo-area{margin-top:24px;}
.memo-label{font-size:12px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.memo-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:12px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:80px;}
.memo-input:focus{outline:none;border-color:var(--accent);}
.memo-input::placeholder{color:var(--text-dim);}
.empty{text-align:center;padding:48px 0;color:var(--text-dim);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:14px;}
.calendar-wrap{display:none;}
.calendar-wrap.show{display:block;}
.day-view.hide{display:none;}
.dashboard-wrap{display:none;}
.dashboard-wrap.show{display:block;}
.history-wrap{display:none;}
.history-wrap.show{display:block;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;}
.cal-day-label{text-align:center;font-size:11px;color:var(--text-muted);padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:background .12s;position:relative;}
.cal-cell:hover{background:var(--surface2);}
.cal-cell.today{color:var(--accent);font-weight:700;}
.cal-cell.selected{background:var(--accent-dim);border:1px solid rgba(200,241,53,.4);}
.cal-cell.has-data::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;background:var(--accent);border-radius:50%;}
.cal-cell.empty-cell{pointer-events:none;}
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-nav button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px 8px;}
.cal-month-label{font-family:'DM Mono',monospace;font-size:14px;}
.dash-period-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;}
.dash-tab{flex:1;padding:7px;text-align:center;font-size:13px;cursor:pointer;border-radius:6px;color:var(--text-muted);transition:all .15s;}
.dash-tab.active{background:var(--surface2);color:var(--text);}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.dash-val{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--accent);line-height:1;margin-bottom:4px;}
.dash-label{font-size:12px;color:var(--text-muted);}
.dash-sub{font-size:11px;color:var(--text-dim);margin-top:4px;font-family:'DM Mono',monospace;}
.dash-section-title{font-size:12px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.rank-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.rank-num{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-dim);min-width:20px;}
.rank-name{flex:1;font-size:14px;font-weight:500;}
.rank-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}
.heatmap-wrap{overflow-x:auto;}
.heatmap-row{display:flex;gap:3px;margin-bottom:3px;}
.heatmap-cell{width:14px;height:14px;border-radius:3px;background:var(--surface2);flex-shrink:0;}
.heatmap-cell.l2{background:rgba(200,241,53,.5);}
/* ── 기록 탭 ── */
.history-select-wrap{position:relative;margin-bottom:24px;}
.history-select-label{font-size:12px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.history-select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 40px 12px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .15s;}
.history-select:focus{outline:none;border-color:var(--accent);}
.history-select-arrow{position:absolute;right:14px;bottom:14px;color:var(--text-muted);pointer-events:none;font-size:14px;}
.history-loading{text-align:center;padding:40px 0;color:var(--text-dim);font-size:14px;}
.history-session{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.history-session-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
.history-session-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);}
.history-session-meta{font-size:12px;color:var(--text-muted);}
.history-set-table{width:100%;border-collapse:collapse;}
.history-set-table th{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 16px 6px;text-align:center;font-weight:400;}
.history-set-table td{font-family:'DM Mono',monospace;font-size:13px;text-align:center;padding:6px 16px;border-top:1px solid var(--border);color:var(--text);}
.history-set-table td.set-idx{color:var(--text-dim);font-size:12px;}
.history-set-table td.note-cell{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text-muted);}
.history-vol{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);padding:7px 16px 10px;text-align:right;}
.history-empty{text-align:center;padding:60px 0;color:var(--text-dim);}
.history-empty-icon{font-size:36px;margin-bottom:12px;}
.history-empty-text{font-size:14px;}
.history-no-select{text-align:center;padding:60px 0;color:var(--text-dim);}
.history-count-badge{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:12px;}
/* ── 추천 루틴 ── */
.rec-section{margin-top:0;margin-bottom:20px;}
.rec-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.rec-refresh-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:2px 4px;transition:color .15s;}
.rec-refresh-btn:hover{color:var(--accent);}
.rec-list{display:flex;flex-direction:column;gap:8px;}
.rec-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rec-item-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.rec-item-name{flex:1;font-size:14px;font-weight:500;}
.rec-item-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.rec-item-chevron{color:var(--text-dim);font-size:16px;transition:transform .2s;}
.rec-item.open .rec-item-chevron{transform:rotate(180deg);}
.rec-item-body{display:none;border-top:1px solid var(--border);padding:10px 14px 14px;}
.rec-item.open .rec-item-body{display:block;}
.rec-ex-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.rec-ex-row:last-child{border-bottom:none;}
.rec-ex-name{font-size:13px;font-weight:500;}
.rec-ex-detail{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}
.rec-add-btn{margin-top:12px;width:100%;background:var(--accent-dim);border:1px solid rgba(200,241,53,.3);color:var(--accent);border-radius:8px;padding:9px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center;}
.rec-add-btn:hover{background:rgba(200,241,53,.2);}
.rec-loading{font-size:13px;color:var(--text-dim);padding:12px 0;text-align:center;}
.rec-empty{font-size:13px;color:var(--text-dim);padding:8px 0;}
/* ── 여닫기 ── */
.section-collapsible{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.section-chevron{color:var(--text-dim);font-size:16px;transition:transform .2s;}
.section-open .section-chevron{transform:rotate(180deg);}
.section-body{display:none;}
.section-open .section-body{display:block;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#111;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}
@media(max-width:480px){
  .sets-header,.set-row{grid-template-columns:28px 1fr 1fr 1fr 32px;gap:6px;padding:6px 12px;}
  .summary-val{font-size:18px;}
  header{padding:12px 16px;}
  .user-email{display:none;}
  .history-set-table th,.history-set-table td{padding:6px 10px;}
}
/* 섹션 헤더 개선 */
.rec-section-header .section-title,
.routine-section .section-title span {
  font-size:14px;
  color:var(--text);
  font-weight:500;
  letter-spacing:.03em;
}
.rec-item-chevron,
.section-chevron {
  font-size:12px;
  color:var(--text-dim);
  font-style:normal;
}
.section-open .rec-item-chevron,
.section-open .section-chevron {
  transform:rotate(180deg);
}

.rec-section-header,
.routine-section > .section-title {
  padding: 4px 0;
  transition: color .15s;
  color: var(--text-muted);
}
.rec-section.section-open .rec-section-header .section-title,
.routine-section.section-open > .section-title span {
  color: var(--text);
}
.add-exercise-area { margin-bottom: 16px; }

/* 추천루틴 / 내루틴 카드 헤더 */
.rec-section-header,
.routine-section > .section-title {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color .15s, background .15s;
}
.rec-section-header:hover,
.routine-section > .section-title:hover {
  border-color: var(--accent);
  background: var(--surface2);
}
.rec-section.section-open .rec-section-header,
.routine-section.section-open > .section-title {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
}
.rec-section.section-open .section-body,
.routine-section.section-open .section-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-bottom-left-radius: var(--radius);
  border-bottom-right-radius: var(--radius);
  padding: 12px 16px 16px;
}
.add-exercise-area { margin-bottom: 20px; }

.rec-section-header {
  margin-bottom: 0;
}
.rec-section .section-body {
  margin-top: 0;
}

</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">WORKOUT LOG</div>
    <div class="auth-title">운동 기록 앱</div>
    <div class="auth-sub">로그인하면 모든 기기에서 동기화됩니다</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">로그인</div>
      <div class="auth-tab" onclick="switchAuthTab('signup')">회원가입</div>
    </div>
    <div class="field-label">이메일</div>

let authMode = 'login';
function switchAuthTab(mode) {
  authMode = mode;

  else { const r = await sb.auth.signUp({email,password}); err = r.error; if(!err){ msg.className='auth-msg success'; msg.textContent='가입 완료! 이메일 인증 후 로그인하세요.'; btn.disabled=false; return; } }
  if (err) { msg.className='auth-msg error'; msg.textContent = err.message.includes('Invalid login') ? '이메일 또는 비밀번호가 틀렸습니다.' : err.message; }

  if (session && session.user) {

// ── datalist DB 연동 ──────────────────────────────────────
async function loadExerciseMaster() {
  const { data } = await sb.from('exercise_master').select('name').eq('user_id', currentUser.id);
  if (!data || !data.length) return;
  const dl = document.getElementById('exercise-master');
  const existing = new Set(Array.from(dl.options).map(o => o.value));
  data.forEach(row => {
    if (!existing.has(row.name)) {
      const opt = document.createElement('option');
      opt.value = row.name;
      dl.appendChild(opt);
    }
  });
}

async function loadDay(date) {
  if (dayCache[date]) return dayCache[date];
  setSyncing(true);
  const {data} = await sb.from('workouts').select('*').eq('user_id', currentUser.id).eq('date', date).maybeSingle();
  setSyncing(false);
  const day = data ? {exercises: data.exercises||[], memo: data.memo||''} : {exercises:[], memo:''};
  dayCache[date] = day;
  return day;
}

async function saveDay(date, dayData) {
  dayCache[date] = dayData;
  setSyncing(true);
  await sb.from('workouts').upsert({user_id:currentUser.id, date:date, exercises:dayData.exercises, memo:dayData.memo, updated_at:new Date().toISOString()}, {onConflict:'user_id,date'});
  setSyncing(false);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const dayData = dayCache[currentDate] || {exercises:[], memo:''};
    dayData.memo = document.getElementById('memo-input').value;
    await saveDay(currentDate, dayData);
  }, 800);
}

function setSyncing(on) {
  const el = document.getElementById('sync-indicator');
  if (el) el.className = 'sync-indicator' + (on ? ' syncing' : '');
}

async function render() {
  const dayData = await loadDay(currentDate);
  document.getElementById('date-display').textContent = formatDate(currentDate);
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  if (!dayData.exercises.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-text">아직 운동이 없습니다. 아래에서 추가하세요.</div></div>';
  } else {
    dayData.exercises.forEach((ex, ei) => renderExercise(list, ex, ei));
    initDragDrop(list);
  }
  document.getElementById('memo-input').value = dayData.memo || '';
  updateSummary(dayData);
  renderRoutineList();
}

function renderExercise(container, ex, ei) {
  const card = document.createElement('div');
  card.className = 'exercise-card open';
  const vol = ex.sets.reduce((a,s) => a+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0), 0);
  let setsHtml = ex.sets.map((s,si) =>
    '<div class="set-row">' +
    '<div class="set-num">' + (si+1) + '</div>' +
    '<input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" value="' + (s.weight||'') + '" placeholder="0" onchange="updateSet(' + ei + ',' + si + ',\'weight\',this.value)">' +
    '<input class="set-input" type="number" inputmode="numeric" min="0" step="1" value="' + (s.reps||'') + '" placeholder="0" onchange="updateSet(' + ei + ',' + si + ',\'reps\',this.value)">' +
    '<input class="set-input" type="text" value="' + (s.note||'') + '" placeholder="—" onchange="updateSet(' + ei + ',' + si + ',\'note\',this.value)" style="font-size:12px">' +
    '<button class="del-set-btn" onclick="deleteSet(' + ei + ',' + si + ')">×</button>' +
    '</div>'
  ).join('');
  card.dataset.ei = ei;
  card.innerHTML =
    '<div class="exercise-header">' +
    '<div class="drag-handle">⠿</div>' +
    '<div style="flex:1;display:flex;align-items:center;gap:10px;" onclick="toggleCard(this)">' +
    '<div class="exercise-name">' + ex.name + '</div>' +
    '<div class="exercise-badge">' + ex.sets.length + '세트 · ' + (vol>0?Math.round(vol)+'kg':'—') + '</div>' +
    '<div class="chevron">⌃</div>' +
    '</div>' +
    '</div>' +
    '<div class="sets-body">' +
    '<div class="sets-header"><div style="text-align:center">세트</div><div style="text-align:center">무게(kg)</div><div style="text-align:center">횟수</div><div style="text-align:center">메모</div><div></div></div>' +
    setsHtml +
    '<div class="card-footer">' +
    '<button class="add-set-btn" onclick="addSet(' + ei + ')">+ 세트 추가</button>' +
    '<button class="del-exercise-btn" onclick="deleteExercise(' + ei + ')">종목 삭제</button>' +
    '</div></div>';
  container.appendChild(card);
}

function toggleCard(el) { el.closest('.exercise-card').classList.toggle('open'); }

let dragSrc = null;
function initDragDrop(list) {
  list.querySelectorAll('.exercise-card').forEach(card => {
    const handle = card.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', e => { dragSrc = card; setTimeout(() => card.classList.add('dragging'), 0); e.dataTransfer.effectAllowed = 'move'; });
    card.addEventListener('dragend', () => { card.draggable = false; card.classList.remove('dragging'); list.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over')); saveDragOrder(list); });
    card.addEventListener('dragover', e => { e.preventDefault(); if (dragSrc && dragSrc !== card) { list.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over')); card.classList.add('drag-over'); const mid = card.getBoundingClientRect().top + card.getBoundingClientRect().height / 2; if (e.clientY < mid) list.insertBefore(dragSrc, card); else list.insertBefore(dragSrc, card.nextSibling); } });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('drag-over'); });
    let touchStartY = 0, touchClone = null;
    handle.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; card.classList.add('dragging'); touchClone = card.cloneNode(true); touchClone.style.cssText = 'position:fixed;z-index:9999;left:' + card.getBoundingClientRect().left + 'px;top:' + card.getBoundingClientRect().top + 'px;width:' + card.offsetWidth + 'px;opacity:.85;pointer-events:none;border:1px solid var(--accent);border-radius:12px;'; document.body.appendChild(touchClone); e.preventDefault(); }, {passive:false});
    handle.addEventListener('touchmove', e => { if (!touchClone) return; const dy = e.touches[0].clientY - touchStartY; touchClone.style.top = (card.getBoundingClientRect().top + dy) + 'px'; const over = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY); const overCard = over ? over.closest('.exercise-card') : null; list.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over')); if (overCard && overCard !== card) { const mid = overCard.getBoundingClientRect().top + overCard.getBoundingClientRect().height / 2; if (e.touches[0].clientY < mid) list.insertBefore(card, overCard); else list.insertBefore(card, overCard.nextSibling); } e.preventDefault(); }, {passive:false});
    handle.addEventListener('touchend', () => { if (touchClone) { document.body.removeChild(touchClone); touchClone = null; } card.classList.remove('dragging'); list.querySelectorAll('.exercise-card').forEach(c => c.classList.remove('drag-over')); saveDragOrder(list); });
  });
}

async function saveDragOrder(list) {
  const dayData = await loadDay(currentDate);
  const oldEx = [...dayData.exercises];
  const newEx = [];
  list.querySelectorAll('.exercise-card').forEach(card => { const ei = parseInt(card.dataset.ei); if (!isNaN(ei) && oldEx[ei]) newEx.push(oldEx[ei]); });
  if (newEx.length === dayData.exercises.length) { dayData.exercises = newEx; await saveDay(currentDate, dayData); list.querySelectorAll('.exercise-card').forEach((card, i) => { card.dataset.ei = i; }); showToast('순서 저장됨'); }
}

function updateSummary(dayData) {
  const vol = dayData.exercises.reduce((a,ex) => a+ex.sets.reduce((b,s) => b+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0),0);
  document.getElementById('sum-exercises').textContent = dayData.exercises.length;
  document.getElementById('sum-sets').textContent = dayData.exercises.reduce((a,ex) => a+ex.sets.length, 0);
  document.getElementById('sum-volume').textContent = Math.round(vol).toLocaleString() + 'kg';
}

async function addExercise() {
  const input = document.getElementById('new-exercise-name');

  dayData.exercises.push({name:name, sets:[{weight:'',reps:'',note:''}]});
  await saveDay(currentDate, dayData);
  const { data: existing } = await sb.from('exercise_master').select('id').eq('user_id', currentUser.id).eq('name', name).maybeSingle();
  if (!existing) {
    await sb.from('exercise_master').insert({user_id: currentUser.id, name: name});
    // datalist에도 즉시 추가
    const dl = document.getElementById('exercise-master');
    const existing2 = Array.from(dl.options).map(o => o.value);
    if (!existing2.includes(name)) { const opt = document.createElement('option'); opt.value = name; dl.appendChild(opt); }
  }
  input.value = '';
  render();
  showToast('종목 추가됨');
}

function quickAdd(name) { document.getElementById('new-exercise-name').value = name; addExercise(); }

async function addSet(ei) {
  const dayData = await loadDay(currentDate);
  const prev = dayData.exercises[ei].sets.slice(-1)[0] || {};
  dayData.exercises[ei].sets.push({weight:prev.weight||'', reps:prev.reps||'', note:''});
  await saveDay(currentDate, dayData);
  render();
}

async function deleteSet(ei, si) {
  const dayData = await loadDay(currentDate);
  dayData.exercises[ei].sets.splice(si, 1);
  await saveDay(currentDate, dayData);
  render();
}

async function deleteExercise(ei) {
  if (!confirm('이 종목을 삭제할까요?')) return;
  const dayData = await loadDay(currentDate);
  dayData.exercises.splice(ei, 1);
  await saveDay(currentDate, dayData);
  render();
  showToast('종목 삭제됨');
}

async function updateSet(ei, si, field, val) {
  const dayData = await loadDay(currentDate);
  dayData.exercises[ei].sets[si][field] = val;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveDay(currentDate, dayData), 600);
  updateSummary(dayData);
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

}

}

function onDatePick(val) { if (val) { currentDate = val; render(); } }

async function loadRoutines() {
  if (routineCache) return routineCache;
  const {data} = await sb.from('routines').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false});

async function renderRoutineList() {
  const routines = await loadRoutines();
  const list = document.getElementById('routine-list');
  if (!routines.length) { list.innerHTML = '<div style="font-size:13px;color:var(--text-dim);padding:8px 0;">저장된 루틴이 없습니다.</div>'; return; }
  list.innerHTML = routines.map((r,i) =>
    '<div class="routine-item">' +
    '<div class="routine-info"><div class="routine-name">' + r.name + '</div><div class="routine-meta">' + r.exercises.length + '종목 · ' + r.exercises.map(e=>e.name).slice(0,3).join(', ') + (r.exercises.length>3?'...':'') + '</div></div>' +

async function loadRoutine(idx) {
  const routines = await loadRoutines();
  const routine = routines[idx];
  if (!confirm('"' + routine.name + '" 루틴을 불러올까요?')) return;
  const dayData = await loadDay(currentDate);
  routine.exercises.forEach(ex => { dayData.exercises.push({name:ex.name, sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,note:''}))}) });
  await saveDay(currentDate, dayData);
  render();
  showToast('루틴 불러오기 완료');
}

function showSaveRoutine() {
  const dayData = dayCache[currentDate];
  if (!dayData || !dayData.exercises.length) { showToast('먼저 운동을 추가하세요'); return; }
  document.getElementById('save-routine-row').style.display = 'flex';
  document.getElementById('show-save-btn').style.display = 'none';
  document.getElementById('routine-name-input').focus();
}

function hideSaveRoutine() {
  document.getElementById('save-routine-row').style.display = 'none';
  document.getElementById('show-save-btn').style.display = 'block';
}

async function saveRoutine() {
  const name = document.getElementById('routine-name-input').value.trim();
  if (!name) { showToast('루틴 이름을 입력하세요'); return; }
  const dayData = dayCache[currentDate];
  if (!dayData || !dayData.exercises.length) { showToast('운동이 없습니다'); return; }
  setSyncing(true);
  await sb.from('routines').insert({user_id:currentUser.id, name:name, exercises:dayData.exercises});
  setSyncing(false);
  routineCache = null;
  document.getElementById('routine-name-input').value = '';
  hideSaveRoutine();
  renderRoutineList();
  showToast('루틴 저장됨');
}

async function deleteRoutine(id) {
  if (!confirm('이 루틴을 삭제할까요?')) return;
  await sb.from('routines').delete().eq('id', id);
  routineCache = null;
  renderRoutineList();
  showToast('루틴 삭제됨');
}

function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach((t,i) => t.classList.toggle('active', ['day','calendar','history','dashboard'][i]===v));
  document.getElementById('calendar-wrap').classList.toggle('show', v==='calendar');
  document.getElementById('day-view').classList.toggle('hide', v!=='day');
  document.getElementById('history-wrap').classList.toggle('show', v==='history');
  document.getElementById('dashboard-wrap').classList.toggle('show', v==='dashboard');
  if (v==='calendar') renderCalendar();
  if (v==='dashboard') renderDashboard();
  if (v==='history') initHistoryTab();
}

async function initHistoryTab() {
  const sel = document.getElementById('history-select');
  const fromDate = (() => { const d = new Date(); d.setDate(d.getDate()-30); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  setSyncing(true);
  const {data} = await sb.from('workouts').select('exercises').eq('user_id', currentUser.id).gte('date', fromDate);
  setSyncing(false);
  const freq = {};
  (data||[]).forEach(row => { (row.exercises||[]).forEach(ex => { freq[ex.name] = (freq[ex.name]||0) + 1; }); });
  let exNames = Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  if (!exNames.length) {
    const {data: allData} = await sb.from('workouts').select('exercises').eq('user_id', currentUser.id);
    const freq2 = {};
    (allData||[]).forEach(row => { (row.exercises||[]).forEach(ex => { freq2[ex.name]=(freq2[ex.name]||0)+1; }); });
    exNames = Object.entries(freq2).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  }
  const prevVal = sel.value;
  sel.innerHTML = '<option value="">— 운동을 선택하세요 —</option>';
  exNames.forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name + (freq[name] ? '  (' + freq[name] + '회/월)' : ''); sel.appendChild(opt); });
  if (prevVal && exNames.includes(prevVal)) { sel.value = prevVal; onHistoryExSelect(prevVal); }
}

async function onHistoryExSelect(name) {
  const content = document.getElementById('history-content');
  if (!name) { content.innerHTML = '<div class="history-no-select"><div class="empty-icon">🔍</div><div style="font-size:14px;color:var(--text-dim);margin-top:8px">위에서 운동을 선택하면<br>최근 기록이 표시됩니다</div></div>'; return; }
  content.innerHTML = '<div class="history-loading">불러오는 중...</div>';
  setSyncing(true);
  const {data} = await sb.from('workouts').select('date,exercises').eq('user_id', currentUser.id).order('date', {ascending:false});
  setSyncing(false);
  const sessions = [];
  for (const row of (data||[])) {
    const ex = (row.exercises||[]).find(e => e.name === name);
    if (ex) { sessions.push({date: row.date, sets: ex.sets || []}); if (sessions.length >= 10) break; }
  }
  if (!sessions.length) { content.innerHTML = '<div class="history-empty"><div class="history-empty-icon">📭</div><div class="history-empty-text">"' + name + '" 기록이 없습니다</div></div>'; return; }
  let html = '<div class="history-count-badge">최근 ' + sessions.length + '회 기록</div>';
  sessions.forEach(session => {
    const vol = session.sets.reduce((a,s) => a+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0), 0);
    const hasNote = session.sets.some(s => s.note && s.note.trim());
    const rowsHtml = session.sets.map((s, i) => '<tr><td class="set-idx">' + (i+1) + '</td><td>' + (s.weight?s.weight+'kg':'—') + '</td><td>' + (s.reps?s.reps+'회':'—') + '</td>' + (hasNote?'<td class="note-cell">'+(s.note||'—')+'</td>':'') + '</tr>').join('');
    html += '<div class="history-session"><div class="history-session-header"><div class="history-session-date">' + formatDateShort(session.date) + '</div><div class="history-session-meta">' + session.sets.length + '세트' + (vol>0?' · '+Math.round(vol).toLocaleString()+'kg':'') + '</div></div><table class="history-set-table"><thead><tr><th>세트</th><th>무게</th><th>횟수</th>' + (hasNote?'<th>메모</th>':'') + '</tr></thead><tbody>' + rowsHtml + '</tbody></table>' + (vol>0?'<div class="history-vol">볼륨 '+Math.round(vol).toLocaleString()+' kg</div>':'') + '</div>';
  });
  content.innerHTML = html;
}

async function renderCalendar() {
  const today = new Date();
  if (calViewYear===undefined) { calViewYear=today.getFullYear(); calViewMonth=today.getMonth(); }
  document.getElementById('cal-month-label').textContent = calViewYear + '년 ' + (calViewMonth+1) + '월';
  const {data} = await sb.from('workouts').select('date,exercises').eq('user_id', currentUser.id).gte('date', calViewYear+'-'+String(calViewMonth+1).padStart(2,'0')+'-01').lte('date', calViewYear+'-'+String(calViewMonth+1).padStart(2,'0')+'-31');
  const datesWithData = new Set((data||[]).filter(r=>r.exercises&&r.exercises.length).map(r=>r.date));
  const first = new Date(calViewYear, calViewMonth, 1);
  const last = new Date(calViewYear, calViewMonth+1, 0);
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => { const el=document.createElement('div'); el.className='cal-day-label'; el.textContent=d; grid.appendChild(el); });
  for (let i=0; i<first.getDay(); i++) { const el=document.createElement('div'); el.className='cal-cell empty-cell'; grid.appendChild(el); }
  for (let d=1; d<=last.getDate(); d++) {
    const dateStr = calViewYear+'-'+String(calViewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el = document.createElement('div'); el.className='cal-cell'; el.textContent=d;
    if (dateStr===todayStr()) el.classList.add('today');
    if (dateStr===currentDate) el.classList.add('selected');
    if (datesWithData.has(dateStr)) el.classList.add('has-data');
    el.onclick = () => { currentDate=dateStr; render(); switchView('day'); };
    grid.appendChild(el);
  }
}

function calPrevMonth() { calViewMonth--; if(calViewMonth<0){calViewMonth=11;calViewYear--;} renderCalendar(); }
function calNextMonth() { calViewMonth++; if(calViewMonth>11){calViewMonth=0;calViewYear++;} renderCalendar(); }

async function renderDashboard() {
  const content = document.getElementById('dash-content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">불러오는 중...</div>';
  const today = new Date();
  let fromDate = '';
  if (dashPeriod==='week') { const d = new Date(today); d.setDate(d.getDate()-6); fromDate = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  else if (dashPeriod==='month') { fromDate = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-01'; }
  let query = sb.from('workouts').select('date,exercises').eq('user_id', currentUser.id);
  if (fromDate) query = query.gte('date', fromDate);
  const {data} = await query.order('date', {ascending:true});
  const rows = (data||[]).filter(r => r.exercises && r.exercises.length);
  const workoutDays = rows.length;
  const totalSets = rows.reduce((a,r) => a+r.exercises.reduce((b,ex) => b+ex.sets.length, 0), 0);
  const totalVol = rows.reduce((a,r) => a+r.exercises.reduce((b,ex) => b+ex.sets.reduce((c,s) => c+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0),0),0);
  const totalEx = rows.reduce((a,r) => a+r.exercises.length, 0);
  const allDates = new Set((data||[]).filter(r=>r.exercises&&r.exercises.length).map(r=>r.date));
  const exFreq = {};
  rows.forEach(r => r.exercises.forEach(ex => { exFreq[ex.name]=(exFreq[ex.name]||0)+1; }));
  const topEx = Object.entries(exFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const periodLabel = dashPeriod==='week'?'최근 7일':dashPeriod==='month'?'이번 달':'전체';
  const rankHtml = topEx.map((e,i) => '<div class="rank-item" style="cursor:pointer;" onclick="goToHistory(\'' + e[0].replace(/'/g,"\\'") + '\')">' + '<div class="rank-num">'+(i+1)+'</div><div class="rank-name">'+e[0]+'</div><div class="rank-count">'+e[1]+'회 <span style="color:var(--accent);font-size:10px;margin-left:4px">→</span></div></div>').join('');
  const weeks = [];
  const hd = new Date(today); hd.setDate(hd.getDate()-hd.getDay());
  for (let w=12; w>=0; w--) { const week = []; for (let day=0; day<7; day++) { const dd=new Date(hd); dd.setDate(hd.getDate()-w*7+day); week.push(dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0')); } weeks.push(week); }
  const heatmapHtml = weeks.map(week => '<div class="heatmap-row">'+week.map(date=>'<div class="heatmap-cell'+(allDates.has(date)?' l2':'')+'" title="'+date+'"></div>').join('')+'</div>').join('');
  content.innerHTML =
    '<div class="dash-grid">' +
    '<div class="dash-card"><div class="dash-val">'+workoutDays+'</div><div class="dash-label">운동한 날</div><div class="dash-sub">'+periodLabel+'</div></div>' +
    '<div class="dash-card"><div class="dash-val">'+Math.round(totalVol).toLocaleString()+'kg</div><div class="dash-label">총 볼륨</div><div class="dash-sub">'+periodLabel+'</div></div>' +
    '<div class="dash-card"><div class="dash-val">'+totalSets+'</div><div class="dash-label">총 세트</div><div class="dash-sub">'+periodLabel+'</div></div>' +
    '<div class="dash-card"><div class="dash-val">'+totalEx+'</div><div class="dash-label">총 종목수</div><div class="dash-sub">'+periodLabel+'</div></div>' +
    '</div>' +
    (topEx.length ? '<div class="dash-section-title">많이 한 운동 TOP 5 <span style="font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:0">탭하면 기록 보기</span></div>'+rankHtml : '') +
    '<div class="dash-section-title" style="margin-top:24px">운동 히트맵 (13주)</div><div class="heatmap-wrap">'+heatmapHtml+'</div>';
}

let recCache = null;

async function buildRecommendedRoutines(force = false) {
  if (recCache && !force) { renderRecList(recCache); return; }
  const recList = document.getElementById('rec-list');
  recList.innerHTML = '<div class="rec-loading">기록 분석 중...</div>';
  setSyncing(true);
  const { data } = await sb.from('workouts').select('date,exercises').eq('user_id', currentUser.id).order('date', { ascending: false });
  setSyncing(false);
  const rows = (data || []).filter(r => r.exercises && r.exercises.length);
  if (rows.length < 3) { recList.innerHTML = '<div class="rec-empty">기록이 더 쌓이면 추천 루틴이 생성됩니다 (최소 3일)</div>'; return; }
  const exBest = {};
  const exCount = {};
  rows.forEach(row => {
    row.exercises.forEach(ex => {
      exCount[ex.name] = (exCount[ex.name] || 0) + 1;
      const maxW = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
      const prevMaxW = exBest[ex.name] ? Math.max(...exBest[ex.name].map(s => parseFloat(s.weight) || 0)) : -1;
      if (maxW > prevMaxW) exBest[ex.name] = ex.sets;
    });
  });
  const myExercises = new Set(Object.keys(exCount));
  const finalRoutines = [];
  ROUTINE_DB.forEach(category => {
    const matched = category.exercises.filter(name => myExercises.has(name));
    if (matched.length < 3) return;
    const sorted = matched.sort((a, b) => (exCount[b] || 0) - (exCount[a] || 0)).slice(0, 6);
    const routineExercises = sorted.map(name => ({ name, sets: (exBest[name] || [{weight:'', reps:''}]).map(s => ({ weight: s.weight || '', reps: s.reps || '', note: '' })) }));
    finalRoutines.push({ name: category.name, basedOn: matched.length + '개 운동 보유', exercises: routineExercises });
  });
  if (!finalRoutines.length) { recList.innerHTML = '<div class="rec-empty">아직 기록이 부족해요. 운동을 더 기록하면 추천이 나타납니다!</div>'; return; }
  recCache = finalRoutines;
  renderRecList(finalRoutines);
}

function renderRecList(routines) {
  const recList = document.getElementById('rec-list');
  recList.innerHTML = routines.map((r, i) => {
    const exRows = r.exercises.map(ex => {
      const lastSet = ex.sets[ex.sets.length - 1] || {};
      const detail = [ex.sets.length + '세트', lastSet.weight ? lastSet.weight + 'kg' : '', lastSet.reps ? lastSet.reps + '회' : ''].filter(Boolean).join(' · ');
      return '<div class="rec-ex-row"><div class="rec-ex-name">' + ex.name + '</div><div class="rec-ex-detail">' + detail + '</div></div>';
    }).join('');
    return '<div class="rec-item" id="rec-item-' + i + '">' +
      '<div class="rec-item-header" onclick="toggleRecItem(' + i + ')">' +
      '<div class="rec-item-name">' + r.name + '</div>' +
      '<div class="rec-item-meta">' + r.exercises.length + '종목 · ' + r.basedOn + '</div>' +
      '<div class="rec-item-chevron">⌃</div>' +
      '</div>' +
      '<div class="rec-item-body">' + exRows +
      '<button class="rec-add-btn" onclick="addRecRoutine(' + i + ')">+ 오늘 운동에 추가</button>' +
      '</div></div>';
  }).join('');
}

function toggleRecItem(i) { document.getElementById('rec-item-' + i).classList.toggle('open'); }

async function addRecRoutine(i) {
  if (!recCache || !recCache[i]) return;
  const routine = recCache[i];
  const dayData = await loadDay(currentDate);
  routine.exercises.forEach(ex => { dayData.exercises.push({ name: ex.name, sets: ex.sets.map(s => ({ weight: s.weight, reps: s.reps, note: '' })) }); });
  await saveDay(currentDate, dayData);
  render();
  showToast('추천 루틴 추가됨');
}

function toggleSection(id) { document.getElementById(id).classList.toggle('section-open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
